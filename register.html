<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account · Inkwell</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar" id="navSlot"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Join Inkwell</h1>
      <p class="sub">Create an account to start writing.</p>
      <div class="error-msg" id="errorMsg"></div>
      <form id="registerForm">
        <div class="field"><label for="username">Username</label><input id="username" autocomplete="username" required minlength="3"></div>
        <div class="field"><label for="email">Email</label><input id="email" type="email" autocomplete="email" required></div>
        <div class="field"><label for="password">Password</label><input id="password" type="password" autocomplete="new-password" required minlength="6"></div>
        <button type="submit" class="btn-primary">Create account</button>
      </form>
      <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    Blog.renderNav('');
    if (Blog.getToken()) location.href = 'index.html';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.remove('show');
      try {
        const data = await Blog.api('/api/auth/register', 'POST', {
          username: document.getElementById('username').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        });
        Blog.setSession(data.token, data.user);
        location.href = 'index.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add('show');
      }
    });
  </script>
</body>
</html>
