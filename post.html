<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post · Inkwell</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar" id="navSlot"></div>
  <div class="main">
    <div class="post-full" id="postContainer"></div>

    <hr class="divider">

    <div class="comments-head" id="commentsHead">Comments</div>

    <div class="comment-form" id="commentFormWrap" style="display:none;">
      <form id="commentForm">
        <textarea id="commentContent" placeholder="Add a comment…" required maxlength="1000"></textarea>
        <div class="submit-row"><button type="submit">Comment</button></div>
      </form>
    </div>
    <p class="sub" id="loginPrompt" style="display:none;"><a href="login.html" style="color:var(--primary)">Log in</a> to leave a comment.</p>

    <div id="commentsList"></div>
  </div>

  <script src="js/api.js"></script>
  <script>
    Blog.renderNav('feed');
    const postId = new URLSearchParams(location.search).get('id');
    const currentUser = Blog.getUser();

    let post = null;

    function initial(name) { return name.charAt(0).toUpperCase(); }

    function renderPost() {
      const container = document.getElementById('postContainer');
      const isOwner = currentUser && post.user_id === currentUser.id;
      container.innerHTML = `
        <h1 class="post-title">${Blog.escapeHtml(post.title)}</h1>
        <div class="post-meta">
          <span class="author">@${Blog.escapeHtml(post.author)}</span>
          <span class="dot-sep"></span>
          <span>${Blog.timeAgo(post.created_at)}</span>
        </div>
        <div class="post-body">${Blog.escapeHtml(post.content)}</div>
        ${isOwner ? `
          <div class="post-owner-actions">
            <a href="edit-post.html?id=${post.id}">Edit</a>
            <button class="delete" id="deletePostBtn">Delete</button>
          </div>` : ''}
      `;
      if (isOwner) {
        document.getElementById('deletePostBtn').addEventListener('click', async () => {
          if (!confirm('Delete this post? This cannot be undone.')) return;
          try {
            await Blog.api(`/api/posts/${post.id}`, 'DELETE');
            location.href = 'index.html';
          } catch (err) { alert(err.message); }
        });
      }
    }

    function renderComments() {
      document.getElementById('commentsHead').textContent = `Comments (${post.comments.length})`;
      const list = document.getElementById('commentsList');
      if (post.comments.length === 0) {
        list.innerHTML = `<div class="empty-state">No comments yet. Be the first to reply.</div>`;
        return;
      }
      list.innerHTML = post.comments.map(c => {
        const canDelete = currentUser && (currentUser.id === c.user_id || currentUser.id === post.user_id);
        return `
          <div class="comment" data-id="${c.id}">
            <div class="avatar">${initial(c.username)}</div>
            <div class="body">
              <div class="head"><span class="name">@${Blog.escapeHtml(c.username)}</span><span class="time">${Blog.timeAgo(c.created_at)}</span></div>
              <p>${Blog.escapeHtml(c.content)}</p>
              ${canDelete ? `<button class="delete-comment-btn">Delete</button>` : ''}
            </div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('.comment').forEach(el => {
        const btn = el.querySelector('.delete-comment-btn');
        if (!btn) return;
        btn.addEventListener('click', async () => {
          try {
            await Blog.api(`/api/comments/${el.dataset.id}`, 'DELETE');
            post.comments = post.comments.filter(c => String(c.id) !== el.dataset.id);
            renderComments();
          } catch (err) { alert(err.message); }
        });
      });
    }

    document.getElementById('commentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const textarea = document.getElementById('commentContent');
      try {
        const comment = await Blog.api(`/api/posts/${postId}/comments`, 'POST', { content: textarea.value.trim() });
        post.comments.push(comment);
        textarea.value = '';
        renderComments();
      } catch (err) { alert(err.message); }
    });

    async function load() {
      try {
        post = await Blog.api(`/api/posts/${postId}`);
        renderPost();
        renderComments();
        if (currentUser) document.getElementById('commentFormWrap').style.display = 'block';
        else document.getElementById('loginPrompt').style.display = 'block';
      } catch (err) {
        document.getElementById('postContainer').innerHTML = `<div class="empty-state">${Blog.escapeHtml(err.message)}</div>`;
      }
    }
    load();
  </script>
</body>
</html>
